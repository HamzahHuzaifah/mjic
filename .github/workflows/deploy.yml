name: Deploy Next.js to cPanel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required for delta deployment in FTP-Deploy-Action

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Next.js App
        run: npm run build

      - name: Create Restart File
        run: |
          mkdir -p tmp
          echo "Deployed on $(date)" > tmp/restart.txt

      - name: Prepare Files for Sync (Remove .gitignore)
        run: rm -f .gitignore

      - name: Sync Files to cPanel via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ secrets.FTP_SERVER_DIR }} # Directory path on cPanel, e.g., /public_html or /apps/web-mjic
          local-dir: ./
          # Exclude source code files that are compiled during build to save disk space and upload time
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/backend/**
            **/app/**
            **/components/**
            README.md
            catatan.md
            init-database.sql
            tsconfig.json
            eslint.config.mjs
            postcss.config.mjs
